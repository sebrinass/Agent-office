services:
  office-website:
    build:
      context: .
      dockerfile: Dockerfile
    image: office-website:latest
    container_name: office-website
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - office-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  office-network:
    driver: bridge
