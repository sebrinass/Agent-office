user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # WASM files - correct MIME type
        location ~* \.wasm$ {
            types {
                application/wasm wasm;
            }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # JS files
        location ~* \.js$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Static assets with hash
        location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ONLYOFFICE SDK files
        location /v9.3.0.24-1/ {
            alias /usr/share/nginx/html/v9.3.0.24-1/;
            try_files $uri =404;
            
            # CORS for cross-origin requests
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        }

        # x2t WASM files - with Brotli encoding
        location /x2t/ {
            alias /usr/share/nginx/html/x2t/;
            try_files $uri =404;
            
            # Add Brotli encoding header for x2t directory files
            location ~* \.(js|wasm)$ {
                add_header Content-Encoding br;
            }
        }

        # x2t-1 - NO Brotli encoding (no .br files)
        location /x2t-1/ {
            alias /usr/share/nginx/html/x2t-1/;
            try_files $uri =404;
            
            # Ensure no Content-Encoding header for x2t-1
            location ~* \.(js|wasm)$ {
                # Do NOT add Content-Encoding header here
            }
        }

        # SPA fallback - try files first, then index.html
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # API proxy (if needed for backend)
        # location /api/ {
        #     proxy_pass http://backend:3000;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host $host;
        # }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
